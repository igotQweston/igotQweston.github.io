<footer class="footer text-muted">
    <div class="container-{{ site.Params.doks.containerBreakpoint | default "lg" }}">
      <div class="row">
        <div class="col-lg-8 text-center text-lg-start">
          <ul class="list-inline">
            {{ range .Site.Menus.footer -}}
              <li class="list-inline-item"><a class="text-muted" href="{{ .URL | relURL }}">{{ .Name }}</a></li>
            {{- end }}
            {{ with site.Home.OutputFormats.Get "RSS" -}}
              <li class="list-inline-item"><a class="text-muted" href="{{ .RelPermalink }}">RSS</a></li>
            {{- end }}
          </ul>
        </div>
        <div class="col-lg-8 text-center text-lg-end">
          <ul class="list-inline">
            <li class="list-inline-item">{{ site.Params.footer | safeHTML }}</li>
            <li class="list-inline-item">{{ .Site.Copyright | safeHTML }}</li>
          </ul>
          <span class="h-card visually-hidden">
            <a class="p-name u-url" href="{{ site.Home.Permalink }}">{{ site.Title }}</a>
          </span>
        </div>
      </div>
    </div>
  </footer>
